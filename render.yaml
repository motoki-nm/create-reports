services:
  - type: web
    name: daily-report
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "your-app-name.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: daily-report-db
          property: connectionString

databases:
  - name: daily-report-db
    databaseName: daily_report
    user: daily_report
