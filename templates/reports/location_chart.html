{% extends "reports/base.html" %}
{% block title %}地域グラフ - 日報管理{% endblock %}
{% block nav_location %}active{% endblock %}
{% block mob_location %}active{% endblock %}

{% block content %}
<h1>地域別 売上グラフ</h1>

<!-- 期間フィルター -->
<div class="card" style="padding:12px 16px; margin-bottom:16px;">
  <form method="get" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
    <label style="margin:0; font-size:13px; font-weight:600; color:var(--text-secondary);">期間</label>
    <select name="month" style="width:auto; min-width:140px;" onchange="this.form.submit()">
      <option value="">全期間</option>
      {% for m in available_months %}
      <option value="{{ m.value }}" {% if selected_month == m.value %}selected{% endif %}>{{ m.label }}</option>
      {% endfor %}
    </select>
    <span style="font-size:13px; color:var(--text-secondary); background:#f1f5f9; padding:4px 12px; border-radius:20px;">{{ selected_label }}</span>
  </form>
</div>

<!-- パンくず（ドリルダウン時に表示） -->
<div id="breadcrumb" style="display:none; margin-bottom:12px; display:none; align-items:center; gap:10px;">
  <button onclick="goBack()" class="btn btn-secondary btn-sm" style="min-width:80px;">← 戻る</button>
  <span style="font-size:13px; color:var(--text-secondary);">全体 › <span id="bc-district" style="color:var(--primary); font-weight:600;"></span></span>
</div>

<!-- グラフカード -->
<div class="card">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px;">
    <h2 id="chart-title" style="margin:0; font-size:17px;">区別 売上グラフ</h2>
    <span id="chart-hint" style="font-size:12px; color:var(--text-secondary); background:#dbeafe; color:#1d4ed8; padding:4px 10px; border-radius:20px;">棒グラフをクリックで地域別を表示</span>
  </div>
  <div style="position:relative; height:300px;">
    <canvas id="locationChart"></canvas>
  </div>
</div>

<!-- 集計テーブル -->
<div class="card">
  <h2 id="table-title" style="font-size:15px; margin-bottom:12px;">区別 集計</h2>
  <div class="table-wrap">
    <table id="summary-table">
      <thead id="table-head"></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function() {
  const ALL_DATA = {{ chart_data|safe }};

  const PALETTE = [
    '#2563eb','#16a34a','#d97706','#dc2626',
    '#7c3aed','#0891b2','#db2777','#65a30d','#64748b'
  ];

  // Build district→color map (sorted by amount desc)
  const districtOrder = Object.keys(ALL_DATA).sort((a,b) => ALL_DATA[b].amount - ALL_DATA[a].amount);
  const COLOR_MAP = {};
  districtOrder.forEach((d,i) => { COLOR_MAP[d] = PALETTE[i % PALETTE.length]; });

  let myChart = null;
  let currentDistrict = null;

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // Plugin: draw 件数 on top of each bar
  const countLabelPlugin = {
    id: 'countLabel',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      const ds = chart.data.datasets[0];
      if (!ds || !ds.counts) return;
      chart.getDatasetMeta(0).data.forEach((bar, i) => {
        ctx.save();
        ctx.font = 'bold 11px "Hiragino Sans", sans-serif';
        ctx.fillStyle = '#475569';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(ds.counts[i] + '件', bar.x, bar.y - 3);
        ctx.restore();
      });
    }
  };

  function buildChart(labels, amounts, counts, bgColors, borderColors, clickHandler) {
    if (myChart) myChart.destroy();
    const ctx = document.getElementById('locationChart').getContext('2d');
    myChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '売上金額',
          data: amounts,
          counts,
          backgroundColor: bgColors,
          borderColor: borderColors,
          borderWidth: 2,
          borderRadius: 6,
          borderSkipped: false,
        }]
      },
      plugins: [countLabelPlugin],
      options: {
        responsive: true,
        maintainAspectRatio: false,
        onClick(evt, elements) {
          if (elements.length && clickHandler) clickHandler(elements[0].index);
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title(items) {
                const lbl = items[0].label;
                return currentDistrict ? `${currentDistrict} ${lbl}` : lbl;
              },
              label(item) {
                const c = item.dataset.counts[item.dataIndex];
                const a = item.parsed.y;
                const avg = c ? Math.round(a / c) : 0;
                return [
                  `金額: ¥${a.toLocaleString()}`,
                  `件数: ${c}件`,
                  `平均: ¥${avg.toLocaleString()}/件`,
                ];
              },
              afterBody(items) {
                if (!currentDistrict && items.length) return ['', '▶ クリックで地域別を表示'];
                return [];
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            ticks: { callback: v => '¥' + Number(v).toLocaleString() }
          },
          x: { ticks: { font: { size: 11 } } }
        },
        layout: { padding: { top: 28 } }
      }
    });
  }

  function showDistrictChart() {
    currentDistrict = null;

    // Hide breadcrumb
    const bc = document.getElementById('breadcrumb');
    bc.style.display = 'none';

    document.getElementById('chart-title').textContent = '区別 売上グラフ';
    document.getElementById('chart-hint').style.display = '';
    document.getElementById('table-title').textContent = '区別 集計';

    const labels = districtOrder;
    const amounts = labels.map(d => ALL_DATA[d].amount);
    const counts = labels.map(d => ALL_DATA[d].count);
    const bg = labels.map(d => hexToRgba(COLOR_MAP[d], 0.75));
    const border = labels.map(d => COLOR_MAP[d]);

    buildChart(labels, amounts, counts, bg, border, idx => showStreetChart(labels[idx]));
    updateTable(labels, amounts, counts, null);
  }

  function showStreetChart(district) {
    currentDistrict = district;
    const color = COLOR_MAP[district];

    // Show breadcrumb
    const bc = document.getElementById('breadcrumb');
    bc.style.display = 'flex';
    document.getElementById('bc-district').textContent = district;

    document.getElementById('chart-title').textContent = `${district} 地域別 売上グラフ`;
    document.getElementById('chart-hint').style.display = 'none';
    document.getElementById('table-title').textContent = `${district} 地域別 集計`;

    const streets = ALL_DATA[district].streets;
    const sorted = Object.entries(streets).sort((a,b) => b[1].amount - a[1].amount);
    const labels = sorted.map(([s]) => s);
    const amounts = sorted.map(([,d]) => d.amount);
    const counts = sorted.map(([,d]) => d.count);

    // Vary opacity per bar for visual variety
    const bg = sorted.map((_, i) => hexToRgba(color, Math.max(0.35, 0.85 - i * 0.04)));
    const border = sorted.map(() => color);

    buildChart(labels, amounts, counts, bg, border, null);
    updateTable(labels, amounts, counts, district);
  }

  function updateTable(labels, amounts, counts, district) {
    const totalAmt = amounts.reduce((s,v) => s+v, 0);
    const totalCnt = counts.reduce((s,v) => s+v, 0);

    document.getElementById('table-head').innerHTML = `<tr>
      <th>${district ? '地域名' : '区'}</th>
      <th class="text-right">件数</th>
      <th class="text-right">金額</th>
      <th class="text-right">平均単価</th>
      <th class="text-right">構成比</th>
    </tr>`;

    let rows = '';
    labels.forEach((label, i) => {
      const avg = counts[i] ? Math.round(amounts[i] / counts[i]) : 0;
      const pct = totalAmt ? ((amounts[i] / totalAmt) * 100).toFixed(1) : '0.0';
      const color = district ? COLOR_MAP[district] : COLOR_MAP[label];
      const dot = color
        ? `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin-right:6px;flex-shrink:0;"></span>`
        : '';
      const clickAttr = !district
        ? `onclick="showStreetChart('${label.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'); return false;" style="cursor:pointer;"`
        : '';
      rows += `<tr ${clickAttr}>
        <td><span style="display:inline-flex;align-items:center;">${dot}${label}</span></td>
        <td class="text-right">${counts[i]}件</td>
        <td class="text-right">¥${amounts[i].toLocaleString()}</td>
        <td class="text-right">¥${avg.toLocaleString()}</td>
        <td class="text-right">${pct}%</td>
      </tr>`;
    });

    rows += `<tr style="background:#f1f5f9;font-weight:700;border-top:2px solid var(--border);">
      <td>合計</td>
      <td class="text-right">${totalCnt}件</td>
      <td class="text-right">¥${totalAmt.toLocaleString()}</td>
      <td class="text-right">¥${totalCnt ? Math.round(totalAmt/totalCnt).toLocaleString() : 0}</td>
      <td class="text-right">100.0%</td>
    </tr>`;

    document.getElementById('table-body').innerHTML = rows;
  }

  window.goBack = function() { showDistrictChart(); };
  window.showStreetChart = showStreetChart;

  // Initial render
  showDistrictChart();
})();
</script>
{% endblock %}
