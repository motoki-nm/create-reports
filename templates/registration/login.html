<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - 日報管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 44px 36px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }
    .brand {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 6px;
      margin-top: 16px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      color: #0f172a;
      background: #f8fafc;
      -webkit-appearance: none;
    }
    input:focus {
      outline: none;
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .error-box {
      background: #fee2e2;
      color: #991b1b;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .btn {
      width: 100%;
      height: 52px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 24px;
      transition: background .15s;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:active { transform: scale(.98); }
    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #64748b;
    }
    .footer-link a { color: #2563eb; text-decoration: none; font-weight: 600; }
    .success-msg {
      text-align: center;
      color: #16a34a;
      font-size: 14px;
      font-weight: 600;
      background: #dcfce7;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">📋</div>
  <div class="brand">日報管理システム</div>
  <div class="subtitle">ドライバー名とパスワードでログイン</div>

  {% if request.GET.registered %}
  <div class="success-msg">✅ 登録が完了しました。ログインしてください。</div>
  {% endif %}

  {% if form.errors %}
  <div class="error-box">ユーザー名またはパスワードが正しくありません。</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">
    <label for="id_username">ユーザー名（ドライバー名）</label>
    <input type="text" id="id_username" name="username" autofocus autocomplete="username" placeholder="例：田中">
    <label for="id_password">パスワード</label>
    <input type="password" id="id_password" name="password" autocomplete="current-password" placeholder="パスワード">
    <button type="submit" class="btn">ログイン</button>
  </form>

  <p class="footer-link">アカウントをお持ちでない方は <a href="/register/">新規登録</a></p>
</div>
</body>
</html>
